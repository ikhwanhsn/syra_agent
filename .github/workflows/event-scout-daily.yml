# Event Scout — scrape (Web + X + Luma). POST /internal/events/run
name: Event scout

on:
  schedule:
    # Every 6 hours — near-realtime for s3labs /events
    - cron: "30 */6 * * *"
  workflow_dispatch: {}

jobs:
  run-event-scout:
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/events/run
        env:
          BASE_URL: ${{ secrets.EVENT_SCOUT_BASE_URL }}
          EVENT_SCOUT_CRON_SECRET: ${{ secrets.EVENT_SCOUT_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${EVENT_SCOUT_CRON_SECRET:-}" ]; then
            echo "::warning::Set EVENT_SCOUT_BASE_URL and EVENT_SCOUT_CRON_SECRET."
            exit 0
          fi
          ORIGIN="${BASE_URL%/}"
          HTTP_CODE=$(curl -sS -o /tmp/event-scout.json -w "%{http_code}" -X POST "${ORIGIN}/internal/events/run" \
            -H "x-event-scout-cron-secret: ${EVENT_SCOUT_CRON_SECRET}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{}")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/event-scout.json
          test "$HTTP_CODE" = "200"
