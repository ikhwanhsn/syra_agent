# Daily Agent Team pipeline at 06:00 WIB (Asia/Jakarta, UTC+7).
# That wall-clock time is 23:00 UTC on the previous calendar date (GitHub cron uses UTC).
#
# Repository secrets:
#   SYRA_AGENT_TEAM_BASE_URL — e.g. https://api.syraa.fun (no trailing slash)
#   SYRA_AGENT_TEAM_CRON_SECRET — must match AGENT_TEAM_CRON_SECRET on the API host
#
# On the API: set SYRA_DEV_BOT_TOKEN + SYRA_DEV_BOT_CHAT_ID so Telegram digests send.
name: Agent team daily (06:00 WIB)

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  run-agent-team:
    runs-on: ubuntu-latest
    steps:
      - name: POST /internal/agent-team/run
        env:
          BASE_URL: ${{ secrets.SYRA_AGENT_TEAM_BASE_URL }}
          AGENT_TEAM_CRON_SECRET: ${{ secrets.SYRA_AGENT_TEAM_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ] || [ -z "${AGENT_TEAM_CRON_SECRET:-}" ]; then
            echo "::warning::Set SYRA_AGENT_TEAM_BASE_URL and SYRA_AGENT_TEAM_CRON_SECRET in repo secrets to enable this job."
            exit 0
          fi
          ORIGIN="${BASE_URL%/}"
          echo "Running agent team at ${ORIGIN}/internal/agent-team/run"
          HTTP_CODE=$(curl -sS -o /tmp/agent-team.json -w "%{http_code}" -X POST "${ORIGIN}/internal/agent-team/run" \
            -H "x-agent-team-cron-secret: ${AGENT_TEAM_CRON_SECRET}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{}")
          echo "HTTP ${HTTP_CODE}"
          cat /tmp/agent-team.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Agent team returned HTTP ${HTTP_CODE}"
            exit 1
          fi
          node -e "const r=require('/tmp/agent-team.json'); if(!r.success){console.error(r); process.exit(1)}"
