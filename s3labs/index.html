<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("s3labs-theme");
          document.documentElement.classList.add(theme === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>S3 Labs — Growth Partner for Solana Developers</title>
    <meta
      name="description"
      content="S3 Labs helps developers who have won hackathons or built an MVP to generate revenue and scale within the Solana ecosystem. Apply your project today."
    />
    <meta
      name="keywords"
      content="Solana, Web3, accelerator, hackathon, MVP, blockchain, developer, growth partner, S3 Labs"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="S3 Labs — Growth Partner for Solana Developers"
    />
    <meta
      property="og:description"
      content="We help developers who have won hackathons or already built an MVP to generate revenue and scale within the Solana ecosystem."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:image"
      content="https://s3labs.id/images/black-logo.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="S3 Labs — Growth Partner for Solana Developers"
    />
    <meta
      name="twitter:description"
      content="We help developers who have won hackathons or already built an MVP to generate revenue and scale within the Solana ecosystem."
    />
    <meta
      name="twitter:image"
      content="https://s3labs.id/images/black-logo.png"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://s3labs.io" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
