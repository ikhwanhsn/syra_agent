<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("s3labs-theme");
          document.documentElement.classList.add(theme === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>S3Labs — The AI-Powered Ecosystem for Web3</title>
    <meta
      name="description"
      content="S3Labs is the AI-powered Web3 ecosystem that helps anyone discover opportunities, launch faster, and earn more. Discover. Build. Earn."
    />
    <meta
      name="keywords"
      content="S3Labs, Web3, AI, ecosystem, opportunities, jobs, hackathons, campaigns, AI agents, Solana, earn, community"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="S3Labs — The AI-Powered Ecosystem for Web3"
    />
    <meta
      property="og:description"
      content="Discover opportunities, launch ideas faster, connect with the Web3 ecosystem, and unlock new ways to earn using AI-powered products."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta
      property="og:image"
      content="https://s3labs.xyz/images/black-logo.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="S3Labs — The AI-Powered Ecosystem for Web3"
    />
    <meta
      name="twitter:description"
      content="Discover opportunities, launch ideas faster, connect with the Web3 ecosystem, and unlock new ways to earn using AI-powered products."
    />
    <meta
      name="twitter:image"
      content="https://s3labs.xyz/images/black-logo.png"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://s3labs.xyz" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
